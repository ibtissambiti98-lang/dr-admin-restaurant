<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>احجز طاولتك - نافذة ذكية</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .booking-btn { background-color: #e67e22; color: white; border: none; padding: 15px 35px; font-size: 18px; border-radius: 30px; cursor: pointer; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .smart-modal { background-color: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; text-align: center; }
    </style>
</head>
<body>
    <button class="booking-btn" id="openBookingBtn">احجز طاولتك الآن</button>
    <div class="modal-overlay" id="modalOverlay">
        <div class="smart-modal">
            <span id="closeModalBtn" style="cursor:pointer; float:left;">&times;</span>
            <h3>نافذة الحجز الذكية</h3>
            <p>أهلاً بك في نظامنا المطور!</p>
            <button onclick="alert('تم الحجز!')" style="background:#2ecc71; color:white; border:none; padding:10px; width:100%;">متابعة الحجز</button>
        </div>
    </div>
    <script>
        const overlay = document.getElementById('modalOverlay');
        document.getElementById('openBookingBtn').addEventListener('click', () => overlay.classList.add('active'));
        document.getElementById('closeModalBtn').addEventListener('click', () => overlay.classList.remove('active'));
    </script>
</body>
</html>
