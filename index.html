<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>احجز طاولتك - نافذة ذكية</title>
    <style>
        /* إعدادات الخطوط والتنسيق العام */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* تنسيق زر الحجز الأساسي */
        .booking-btn {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(230, 126, 34, 0.4);
            transition: all 0.3s ease;
        }

        .booking-btn:hover {
            background-color: #d35400;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(230, 126, 34, 0.6);
        }

        /* خلفية النافذة المنبثقة الذكية */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 1000;
        }

        /* النافذة الذكية المتحركة */
        .smart-modal {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            transform: scale(0.7) translateY(-50px);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
        }

        /* تأثير ظهور النافذة بشكل ذكي ومتحرك */
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-overlay.active .smart-modal {
            transform: scale(1) translateY(0);
        }

        /* زر إغلاق النافذة */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #888;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #333;
        }

        /* أيقونة متحركة داخل النافذة */
        .modal-icon {
            font-size: 50px;
            color: #2ecc71;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        h3 {
            margin-top: 0;
            color: #2c3e50;
        }

        /* أقسام البيانات الذكية (اللغة والسرعة) */
        .info-box {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            padding: 12px;
            margin: 15px 0;
            font-size: 15px;
            color: #495057;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-tag {
            font-weight: bold;
            color: #3498db;
        }

        /* زر تأكيد الحجز الداخلي */
        .confirm-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .confirm-btn:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <button class="booking-btn" id="openBookingBtn">احجز طاولتك الآن</button>

    <div class="modal-overlay" id="modalOverlay">
        <div class="smart-modal">
            <span class="close-btn" id="closeModalBtn">&times;</span>
            <div class="modal-icon">✨</div>
            <h3 id="modalTitle">جاري تحميل النظام الذكي...</h3>
            <p id="modalMessage">أهلاً بك! نحن نجهز لك أفضل تجربة حجز.</p>
            
            <div class="info-box">
                <span>لغة التصفح الحالية:</span>
                <span class="info-tag" id="userLanguage">-</span>
            </div>

            <div class="info-box">
                <span>سرعة اتصالك الحالية:</span>
                <span class="info-tag" id="connectionSpeed">جاري القياس...</span>
            </div>

            <button class="confirm-btn">متابعة عملية الحجز</button>
        </div>
    </div>

    <script>
        const openBtn = document.getElementById('openBookingBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        const overlay = document.getElementById('modalOverlay');

        // عناصر تحديث البيانات ديناميكياً
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        const userLangElement = document.getElementById('userLanguage');
        const speedElement = document.getElementById('connectionSpeed');

        // فتح النافذة وتشغيل الخوارزمية الذكية
        openBtn.addEventListener('click', () => {
            overlay.classList.add('active');
            runSmartFeatures();
        });

        // إغلاق النافذة عند الضغط على زر الإغلاق
        closeBtn.addEventListener('click', () => {
            overlay.classList.remove('active');
        });

        // إغلاق النافذة عند الضغط على أي مكان خارجها
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) {
                overlay.classList.remove('active');
            }
        });

        // الدالة الذكية لتحليل لغة وسرعة المتصفح لتجربة مدهشة للعملاء
        function runSmartFeatures() {
            // 1. جلب لغة المتصفح الحالية وتخصيص النصوص بناءً عليها
            const browserLang = navigator.language || navigator.userLanguage;
            userLangElement.textContent = browserLang.toUpperCase();

            if (browserLang.startsWith('ar')) {
                modalTitle.textContent = "نافذة الحجز الذكية";
                modalMessage.textContent = "لقد لاحظنا أنك تتصفح موقعنا باللغة العربية، أهلاً بك في نظامنا المطور!";
            } else if (browserLang.startsWith('fr')) {
                modalTitle.textContent = "Réservation Inteligente";
                modalMessage.textContent = "Nous avons détecté que vous naviguez en Français. Bienvenue!";
            } else {
                modalTitle.textContent = "Smart Booking System";
                modalMessage.textContent = "We noticed you are browsing in English. Welcome to our premium system!";
            }

            // 2. قياس وعرض سرعة التصفح (الإنترنت) الخاصة بالعميل
            if (navigator.connection && navigator.connection.downlink) {
                const speedMbps = navigator.connection.downlink; // قياس سرعة التحميل بالميجابت
                
                let speedStatus = "";
                if (speedMbps >= 5) {
                    speedStatus = "سريع جداً (" + speedMbps + " Mbps) ⚡";
                } else if (speedMbps >= 2) {
                    speedStatus = "مستقر (" + speedMbps + " Mbps) 🟢";
                } else {
                    speedStatus = "بطيء نسبياً (" + speedMbps + " Mbps) ⏳";
                }
                speedElement.textContent = speedStatus;
            } else {
                // حل بديل ذكي في حال لم يكن المتصفح يدعم خاصية Connection API بشكل مباشر
                speedElement.textContent = "جاري القياس بدقة... 🔍";
                const startTime = performance.now();
                
                // نقوم بعمل طلب وهمي خفيف جداً لقياس سرعة الاستجابة اللحظية لتصفح الخادم
                fetch('https://httpbin.org/get', { mode: 'cors' })
                .then(() => {
                    const duration = (performance.now() - startTime).toFixed(0);
                    if (duration < 300) {
                        speedElement.textContent = "ممتازة (" + duration + " ms) ⚡";
                    } else {
                        speedElement.textContent = "متوسطة (" + duration + " ms) 🟢";
                    }
                })
                .catch(() => {
                    speedElement.textContent = "متصل (جيد) 👍";
                });
            }
        }
    </script>
</body>
</html>
